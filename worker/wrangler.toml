name = "ops-hub-learning-loop-relay"
main = "src/index.ts"
compatibility_date = "2026-07-01"

[vars]
GITHUB_REPO = "dotfound/ops-hub"
DAILY_CAP = "100"

[[kv_namespaces]]
binding = "DAILY_CAP_KV"
id = "REPLACE_WITH_REAL_KV_NAMESPACE_ID"

[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "1001"

  [ratelimits.simple]
  limit = 10
  period = 60
